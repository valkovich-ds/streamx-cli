name: Trigger release

on:
  workflow_dispatch:
    inputs:
      type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - preview

permissions:
  contents: write

jobs:
  trigger-release:
    # TODO - apply better security for the release workflow if needed:
    # https://github.com/orgs/community/discussions/155451#discussioncomment-12677922
    # We also can restrict who can create tags.
    # If such a paranoid security not needed, remove this TODO.
    if: contains(fromJSON('["valkovich-ds", "marekczajkowski", "michalcukierman", "kamilchociej"]'), github.actor)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/setup-env
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Run release
        run: ./.github/scripts/release.sh ${{ inputs.type }} -y
