name: 'Test: Release'

on:
  push:
    branches:
      - main
      - native-build-2
    tags:
      - '*'

permissions:
  id-token: write
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: linux-amd64
            artifact: streamx-linux-x86_64
#          - os: ubuntu-24.04-arm
#            name: linux-arm64
#            artifact: streamx-linux-aarch64
          - os: macos-15
            name: macos-arm64
            artifact: streamx-macos-aarch64
#          - os: macos-15-intel
#            name: macos-amd64
#            artifact: streamx-macos-x86_64
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: ${{ secrets.GCP_STREAMX_RELEASES_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_STREAMX_RELEASES_RELEASE_DEPLOY_SA }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'graalvm'
          cache: 'maven'

      - name: Setup Docker via Colima
        if: runner.os == 'macOS'
        run: |
          brew install docker colima
          colima start --vm-type=vz --memory 4 --cpu 3
          sudo ln -sf "$HOME/.colima/default/docker.sock" /var/run/docker.sock
          docker info

      - name: Build native-image executable
        run: |
          ./mvnw clean verify -Dnative

      - name: Prepare artifact
        run: |
          mkdir -p staging
          cp target/*-runner staging/${{ matrix.artifact }}
          chmod +x staging/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lR artifacts/

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'graalvm'

      - name: Run JReleaser
        uses: jreleaser/release-action@v2
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_HOMEBREW_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          JRELEASER_PROJECT_VERSION: ${{ github.ref_name }}
        with:
          arguments: full-release

      - name: JReleaser output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jreleaser-release
          path: |
            out/jreleaser/trace.log
            out/jreleaser/output.properties