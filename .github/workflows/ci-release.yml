name: 'Test: Release'

on:
  push:
    branches:
      - main
      - native-build-2
    tags:
      - '*'

permissions:
  id-token: write
  contents: read

jobs:
  # Docker doesn't work with macOS arm64 at this moment.
  # Therefore, we can't run native image tracing agent during tests on this type of CI runner.
  # Instead, we generate reachability-metadata in as a separte job, then copy it to next jobs.
  reachability-metadata:
    runs-on: ubuntu-24.04
    name: generate-reachability-metadata
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: ${{ secrets.GCP_STREAMX_RELEASES_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_STREAMX_RELEASES_RELEASE_DEPLOY_SA }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'graalvm'
          cache: 'maven'

      - name: Run tests with native-image-agent
        run: |
          ./mvnw test

      - name: Upload reachability metadata
        uses: actions/upload-artifact@v4
        with:
          name: reachability-metadata
          path: src/main/resources/META-INF/native-image/

  build:
    needs: reachability-metadata
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            name: linux-amd64
            artifact: streamx-linux-x86_64
          - os: macos-15
            name: macos-arm64
            artifact: streamx-macos-aarch64
          - os: macos-15-intel
            name: macos-amd64
            artifact: streamx-macos-x86_64
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: ${{ secrets.GCP_STREAMX_RELEASES_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_STREAMX_RELEASES_RELEASE_DEPLOY_SA }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'graalvm'
          cache: 'maven'

      - name: Download reachability metadata
        uses: actions/download-artifact@v4
        with:
          name: reachability-metadata
          path: src/main/resources/META-INF/native-image/

      - name: Setup Docker for macOS
        # Docker doesn't work with macOS arm64 at this moment.
        if: runner.os == 'macOS' && runner.arch == 'X64'
        uses: docker/setup-docker-action@v4

      - name: Build native-image executable
        run: |
          ./mvnw clean verify -Dnative

      - name: Prepare artifact
        run: |
          mkdir -p staging
          cp target/*-runner staging/${{ matrix.artifact }}
          chmod +x staging/${{ matrix.artifact }}

      - name: Smoke test
        run: |
          ./staging/${{ matrix.artifact }} --help