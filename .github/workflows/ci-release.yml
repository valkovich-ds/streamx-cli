name: 'Test: Release'

on:
  push:
#    branches:
#      - main

permissions:
  id-token: write
  contents: read

jobs:
  release-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          # List of available images can be found here:
          # https://github.com/actions/runner-images?tab=readme-ov-file#available-images
          - os: ubuntu-24.04
            name: linux-amd64
          - os: ubuntu-24.04-arm
            name: linux-arm64
          - os: macos-latest
            name: macos-arm64
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: ${{ secrets.GCP_STREAMX_RELEASES_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_STREAMX_RELEASES_RELEASE_DEPLOY_SA }}

      - name: Set up JDK 25
        uses: actions/setup-java@v3
        with:
          java-version: '25'
          distribution: 'graalvm'
          cache: 'maven'

      - name: Run tests
        run: |
          ./mvnw clean verify -Dnative