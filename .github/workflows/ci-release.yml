name: 'Test: Release'

on:
  push:
#    branches:
#      - main

permissions:
  id-token: write
  contents: read

jobs:
  # Running Docker on MacOS runner is very slow because this type of runner
  # can't use nested virtualization and uses QEMU.
  # We would wait hours to finish the build.
  # We need Docker only during tests. Because of this, we run test as a separate job on Linux.
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'graalvm'
          cache: 'maven'

      - run: ./mvnw clean verify

      - name: Upload reachability metadata
        uses: actions/upload-artifact@v4
        with:
          name: reachability-metadata
          path: '**/reachability-metadata.json'

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: linux-amd64
            artifact: streamx-linux-x86_64
#          - os: ubuntu-24.04-arm
#            name: linux-arm64
#            artifact: streamx-linux-aarch64
          - os: macos-15
            name: macos-arm64
            artifact: streamx-macos-aarch64
#          - os: macos-15-intel
#            name: macos-amd64
#            artifact: streamx-macos-x86_64
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: ${{ secrets.GCP_STREAMX_RELEASES_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_STREAMX_RELEASES_RELEASE_DEPLOY_SA }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'graalvm'
          cache: 'maven'

      - name: Download reachability metadata
        uses: actions/download-artifact@v4
        with:
          name: reachability-metadata

      - name: Build native-image executable
        run: |
          ./mvnw clean verify -Dnative -DskipTests

      - name: Prepare artifact
        run: |
          mkdir -p staging
          cp target/*-runner staging/${{ matrix.artifact }}
          chmod +x staging/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lR artifacts/

      - name: Set up JDK 25
        uses: actions/setup-java@v3
        with:
          java-version: '25'
          distribution: 'graalvm'

      - name: Run JReleaser
        uses: jreleaser/release-action@v2
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_HOMEBREW_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          JRELEASER_PROJECT_VERSION: ${{ github.ref_name }}
        with:
          arguments: full-release

      - name: JReleaser output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jreleaser-release
          path: |
            out/jreleaser/trace.log
            out/jreleaser/output.properties