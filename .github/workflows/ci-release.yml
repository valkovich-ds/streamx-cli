name: 'Test: Release'

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      # TODO - remove before merge
      - native-build-2
    tags:
      - '*'

permissions:
  id-token: write
  contents: write

jobs:
  reachability-metadata:
    runs-on: ubuntu-24.04
    name: generate-reachability-metadata
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: ${{ secrets.GCP_STREAMX_RELEASES_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_STREAMX_RELEASES_RELEASE_DEPLOY_SA }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'graalvm'
          cache: 'maven'

      - name: Run tests with native-image-agent
        run: |
          ./mvnw test

      - name: Upload reachability metadata
        uses: actions/upload-artifact@v4
        with:
          name: reachability-metadata
          path: src/main/resources/META-INF/native-image/

  build:
    needs: reachability-metadata
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            name: linux-amd64
            artifact: streamx-linux-x86_64
          - os: macos-15
            name: macos-arm64
            artifact: streamx-macos-aarch64
          - os: macos-15-intel
            name: macos-amd64
            artifact: streamx-macos-x86_64
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: ${{ secrets.GCP_STREAMX_RELEASES_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_STREAMX_RELEASES_RELEASE_DEPLOY_SA }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'graalvm'
          cache: 'maven'

      - name: Download reachability metadata
        uses: actions/download-artifact@v4
        with:
          name: reachability-metadata
          path: src/main/resources/META-INF/native-image/

      - name: Setup Docker for macOS
        if: runner.os == 'macOS' && runner.arch == 'X64'
        uses: docker/setup-docker-action@v4

      - name: Build native-image executable
        run: |
          ./mvnw clean verify -Dnative

      - name: Prepare artifact
        run: |
          mkdir -p staging
          cp target/*-runner staging/${{ matrix.artifact }}
          chmod +x staging/${{ matrix.artifact }}

      - name: Smoke test
        run: |
          ./staging/${{ matrix.artifact }} --help

      - name: Upload native executable
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: staging/${{ matrix.artifact }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    name: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'graalvm'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: streamx-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Release with JReleaser
        uses: jreleaser/release-action@v2
        with:
          arguments: full-release
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_HOMEBREW_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Upload JReleaser output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jreleaser-output
          path: |
            out/jreleaser/trace.log
            out/jreleaser/output.properties