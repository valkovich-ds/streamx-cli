name: 'Cross-build and release if tag found'

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - '*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: write

jobs:
  # Generate reachability metadata for native-image-agent.
  # We could do it in the build job, but it requires running tests.
  # Some tests require Docker, which is not available on macOS arm64.
  # This way we first generate the metadata in this job, and then pass it to the build job.
  reachability-metadata:
    runs-on: ubuntu-24.04
    name: generate-reachability-metadata
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: ${{ secrets.GCP_STREAMX_RELEASES_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_STREAMX_RELEASES_RELEASE_DEPLOY_SA }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'graalvm'
          cache: 'maven'

      - name: Run tests with native-image-agent
        run: |
          .github/scripts/with-capture-docker-logs.sh ./mvnw test
      - name: Upload Docker logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs-reachability-metadata
          path: target/docker-logs/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload reachability metadata
        uses: actions/upload-artifact@v4
        with:
          name: reachability-metadata
          path: src/main/resources/META-INF/native-image/

  build:
    needs: reachability-metadata
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            name: linux-amd64
            artifact: streamx-linux-x86_64
          - os: ubuntu-24.04-arm
            name: linux-arm64
            artifact: streamx-linux-aarch64
          - os: macos-26-xlarge
            name: macos-arm64
            artifact: streamx-macos-aarch64
          - os: macos-26-large
            name: macos-amd64
            artifact: streamx-macos-x86_64
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: ${{ secrets.GCP_STREAMX_RELEASES_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_STREAMX_RELEASES_RELEASE_DEPLOY_SA }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'graalvm'
          cache: 'maven'

      - name: Download reachability metadata
        uses: actions/download-artifact@v4
        with:
          name: reachability-metadata
          path: src/main/resources/META-INF/native-image/

      - name: Build native-image executable
        run: |
          ./mvnw clean
          .github/scripts/with-capture-docker-logs.sh ./mvnw verify -Dnative
      - name: Upload Docker logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs-${{ matrix.name }}
          path: target/docker-logs/
          if-no-files-found: ignore
          retention-days: 7

      - name: Prepare artifact
        run: |
          mkdir -p staging
          cp target/*-runner staging/${{ matrix.artifact }}
          chmod +x staging/${{ matrix.artifact }}

      - name: Smoke test
        run: |
          ./staging/${{ matrix.artifact }} --help

      - name: Upload native executable
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: staging/${{ matrix.artifact }}

  release:
    needs: build
    # Run release step only if tag found
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    name: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        # TODO BEFORE MERGE: replace native-build-2 with main
        run: |
          if ! git branch -r --contains ${{ github.sha }} | grep -q 'origin/native-build-2'; then
            echo "Error: Tag is not on main branch. Cancel release process."
            exit 1
          fi

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'graalvm'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: streamx-*
          merge-multiple: true

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_STREAMX_RELEASE_APP_ID }}
          private-key: ${{ secrets.GH_STREAMX_RELEASE_APP_PRIVATE_KEY }}
          owner: streamx-com
          repositories: homebrew-tap

      - name: Release with JReleaser
        run: |
          ls -la artifacts/
          chmod +x artifacts/streamx-*
          ./mvnw jreleaser:assemble jreleaser:full-release -Djreleaser.strict=true
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_HOMEBREW_GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Upload JReleaser output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jreleaser-output
          path: |
            target/jreleaser/trace.log
            target/jreleaser/output.properties

  brew-install-test:
    needs: release
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            name: linux-amd64
          - os: ubuntu-24.04-arm
            name: linux-arm64
          - os: macos-15
            name: macos-arm64
          - os: macos-15-intel
            name: macos-amd64
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}-brew-install-test
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Install streamx CLI via Homebrew
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          brew tap streamx-com/tap https://github.com/streamx-com/homebrew-tap
          brew install streamx-com/tap/streamx@${{ github.ref_name }}

      - name: Smoke test
        run: |
          streamx --help