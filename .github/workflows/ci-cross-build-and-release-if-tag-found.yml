name: 'Cross-build and release if tag found'

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - '*'

#concurrency:
#  group: ${{ github.workflow }}-${{ github.ref }}
#  cancel-in-progress: true

permissions:
  id-token: write
  contents: write

jobs:
  # GraalVM native image requires reachability metadata (reflection configs, etc.) generated by the tracing agent during tests.
  # This can't be produced via static analysis - the agent records reached classes at test runtime to META-INF/native-image.
  #
  # macOS runners lack Docker support needed for our tests.
  # Intel mac has it via QEMU, but it's too slow - streamx-runner fails to start by timeouts.
  # Since these configs are cross-platform, we generate them on Linux and share across matrix builds.
  #
  # More detailed explanation: https://github.com/streamx-com/streamx-cli/pull/13#discussion_r2882693570
  reachability-metadata:
    runs-on: ubuntu-24.04
    name: generate-reachability-metadata
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: ${{ secrets.GCP_STREAMX_RELEASES_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_STREAMX_RELEASES_RELEASE_DEPLOY_SA }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'graalvm'
          cache: 'maven'

      - name: Run tests with native-image-agent
        run: |
          .github/scripts/with-capture-docker-logs.sh ./mvnw verify
      - name: Upload Docker logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs-reachability-metadata
          path: target/docker-logs/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload reachability metadata
        uses: actions/upload-artifact@v4
        with:
          name: reachability-metadata
          path: src/main/resources/META-INF/native-image/

  build:
    needs: reachability-metadata
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            name: linux-amd64
            artifact: streamx-linux-x86_64
#          - os: ubuntu-24.04-arm
#            name: linux-arm64
#            artifact: streamx-linux-aarch64
#          - os: macos-26
#            name: macos-arm64
#            artifact: streamx-macos-aarch64
#          - os: macos-26-intel
#            name: macos-amd64
#            artifact: streamx-macos-x86_64
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: ${{ secrets.GCP_STREAMX_RELEASES_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_STREAMX_RELEASES_RELEASE_DEPLOY_SA }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'graalvm'
          cache: 'maven'

      - name: Download reachability metadata
        uses: actions/download-artifact@v4
        with:
          name: reachability-metadata
          path: src/main/resources/META-INF/native-image/

      - name: Build native-image executable
        run: |
          ./mvnw clean
          .github/scripts/with-capture-docker-logs.sh ./mvnw verify -Dnative
      - name: Upload Docker logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs-${{ matrix.name }}
          path: target/docker-logs/
          if-no-files-found: ignore
          retention-days: 7

      - name: Prepare artifact
        run: |
          mkdir -p staging
          cp target/*-runner staging/${{ matrix.artifact }}
          chmod +x staging/${{ matrix.artifact }}

      - name: Smoke test
        run: |
          ./staging/${{ matrix.artifact }} --help

      - name: Upload native executable
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: staging/${{ matrix.artifact }}

  release:
    needs: build
    # Run release step only if tag found
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    name: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        # TODO BEFORE MERGE: replace native-build-2 with main
        run: |
          if ! git branch -r --contains ${{ github.sha }} | grep -q 'origin/native-build-2'; then
            echo "Error: Tag is not on main branch. Cancel release process."
            exit 1
          fi

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'graalvm'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: streamx-*
          merge-multiple: true

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_STREAMX_RELEASE_APP_ID }}
          private-key: ${{ secrets.GH_STREAMX_RELEASE_APP_PRIVATE_KEY }}
          owner: streamx-com
          repositories: homebrew-tap

      - name: Release with JReleaser
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_HOMEBREW_GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          ls -la artifacts/
          chmod +x artifacts/streamx-*
          
          # Pre-create platform ZIPs manually
          VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)
          for PLATFORM in linux-x86_64 linux-aarch64 macos-aarch64 macos-x86_64; do
            mkdir -p staging/$PLATFORM/bin
            cp artifacts/streamx-$PLATFORM staging/$PLATFORM/bin/streamx
            cp LICENSE staging/$PLATFORM/
            cd staging
            zip -r ../artifacts/streamx-${VERSION}-${PLATFORM}.zip $PLATFORM/
            cd ..
          done
          
          ./mvnw jreleaser:full-release -Djreleaser.strict=true

      - name: Upload JReleaser output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jreleaser-output
          path: |
            target/jreleaser/trace.log
            target/jreleaser/output.properties

  brew-install-test:
    needs: release
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            name: linux-amd64
          - os: ubuntu-24.04-arm
            name: linux-arm64
          - os: macos-15
            name: macos-arm64
          - os: macos-15-intel
            name: macos-amd64
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}-brew-install-test
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_STREAMX_RELEASE_APP_ID }}
          private-key: ${{ secrets.GH_STREAMX_RELEASE_APP_PRIVATE_KEY }}
          owner: streamx-com
          repositories: homebrew-tap

      # This step may be significantly simplified if streamx-cli repo will be public.
      - name: Install streamx via Homebrew
        env:
          TAP_TAG: streamx-${{ github.ref_name }}
          HOMEBREW_GITHUB_API_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Clone private tap using app token
          brew tap streamx-com/tap https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/streamx-com/homebrew-tap
          cd "$(brew --repository streamx-com/tap)"
          git checkout "${TAP_TAG}"
          
          # Pre-download the release zip using GITHUB_TOKEN (has streamx-cli access)
          gh release download "${{ github.ref_name }}" \
            --repo streamx-com/streamx-cli \
            --pattern "*.zip" \
            --dir /tmp/streamx-assets
          
          # Inject into Homebrew's cache so it skips the download
          DOWNLOAD_URL=$(brew info --json=v2 streamx-com/tap/streamx | jq -r '.formulae[0].urls.stable.url')
          CACHE_ENTRY=$(brew --cache --formula streamx-com/tap/streamx)
          mkdir -p "$(dirname "$CACHE_ENTRY")"
          ASSET_FILE=$(basename "$DOWNLOAD_URL")
          cp "/tmp/streamx-assets/$ASSET_FILE" "$CACHE_ENTRY"
          
          brew install streamx-com/tap/streamx

      - name: Smoke test
        run: |
          streamx --help