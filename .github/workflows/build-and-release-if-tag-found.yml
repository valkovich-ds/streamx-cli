name: 'Build and release if tag found'

# Shown in GitHub Actions UI to distinguish build types:
# - Regular builds
# - Preview releases
# - Releases
run-name: >-
  ${{
    startsWith(github.ref, 'refs/tags/') && contains(github.ref_name, '-rc.')
      && format('Preview release {0}', github.ref_name)
    || startsWith(github.ref, 'refs/tags/')
      && format('Release {0}', github.ref_name)
    || format('Build {0} - {1}', github.head_ref || github.ref_name,
         github.event.pull_request.head.sha || github.sha)
  }}

# Runs on pull requests, pushes to main, and tag pushes (which trigger releases).
on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - '*'

# Only one run at a time per branch — newer pushes cancel older in-progress runs.
# Tag-triggered runs (releases) are not cancelled.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  # GraalVM native image requires reachability metadata (reflection configs, etc.) generated by the tracing agent during tests.
  # This can't be produced via static analysis - the agent records reached classes at test runtime to META-INF/native-image.
  #
  # macOS runners lack Docker support needed for our tests.
  # Intel mac has it via QEMU, but it's too slow - streamx-runner fails to start by timeouts.
  # Since these configs are cross-platform, we generate them on Linux and share across matrix builds.
  #
  # More detailed explanation: https://github.com/streamx-com/streamx-cli/pull/13#discussion_r2882693570
  reachability-metadata:
    runs-on: ubuntu-24.04
    name: generate-reachability-metadata
    permissions:
      id-token: write
      checks: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: ${{ secrets.GCP_STREAMX_RELEASES_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_STREAMX_RELEASES_RELEASE_DEPLOY_SA }}

      - name: Set up JDK
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'mandrel'
          cache: 'maven'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests with native-image-agent
        run: |
          .github/scripts/with-capture-docker-logs.sh ./mvnw verify -Pci

      - name: Upload Docker logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs-reachability-metadata
          path: target/docker-logs/
          if-no-files-found: ignore

      - name: Upload test reports
        if: always()
        uses: scacap/action-surefire-report@v1
        with:
          check_name: Test report - generate-reachability-metadata

      - name: Upload reachability metadata
        uses: actions/upload-artifact@v4
        with:
          name: reachability-metadata
          path: src/main/resources/META-INF/native-image/

  build:
    needs: reachability-metadata
    permissions:
      id-token: write
      checks: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: linux-amd64
            artifact: streamx-linux-x86_64
          - os: ubuntu-24.04-arm
            name: linux-arm64
            artifact: streamx-linux-aarch64
          - os: macos-26
            name: macos-arm64
            artifact: streamx-macos-aarch64
          - os: macos-26-intel
            name: macos-amd64
            artifact: streamx-macos-x86_64
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: ${{ secrets.GCP_STREAMX_RELEASES_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_STREAMX_RELEASES_RELEASE_DEPLOY_SA }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'graalvm'
          cache: 'maven'

      - name: Download reachability metadata
        uses: actions/download-artifact@v4
        with:
          name: reachability-metadata
          path: src/main/resources/META-INF/native-image/

      - name: Build native-image executable
        run: |
          .github/scripts/with-capture-docker-logs.sh ./mvnw verify -Pci,native

      - name: Upload test reports
        if: always()
        uses: scacap/action-surefire-report@v1
        with:
          check_name: Test report - build ${{ matrix.name }}

      - name: Upload Docker logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs-${{ matrix.name }}
          path: target/docker-logs/
          if-no-files-found: ignore

      - name: Prepare artifact
        run: |
          ls -la target/
          mkdir -p staging
          cp target/*-runner staging/${{ matrix.artifact }}
          chmod +x staging/${{ matrix.artifact }}

      - name: Smoke test
        run: |
          ./staging/${{ matrix.artifact }} --help

      - name: Upload native executable
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: staging/${{ matrix.artifact }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    name: release
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release type
        id: release-type
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *-rc.* ]]; then
            echo "type=preview" >> $GITHUB_OUTPUT
            echo "jreleaser_config=jreleaser-preview.yml" >> $GITHUB_OUTPUT
            echo "brew_tap=homebrew-preview" >> $GITHUB_OUTPUT
            echo "brew_tap_slug=valkovich-ds/preview-tap" >> $GITHUB_OUTPUT
          else
            echo "type=stable" >> $GITHUB_OUTPUT
            echo "jreleaser_config=jreleaser.yml" >> $GITHUB_OUTPUT
            echo "brew_tap=homebrew-tap" >> $GITHUB_OUTPUT
            echo "brew_tap_slug=valkovich-ds/tap" >> $GITHUB_OUTPUT
          fi
          echo "Release type: $(grep type <<< "$(cat $GITHUB_OUTPUT)" | head -1)"

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'graalvm'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: streamx-*
          merge-multiple: true

#      - name: Generate GitHub App token
#        id: app-token
#        uses: actions/create-github-app-token@v1
#        with:
#          app-id: ${{ secrets.GH_STREAMX_RELEASE_APP_ID }}
#          private-key: ${{ secrets.GH_STREAMX_RELEASE_APP_PRIVATE_KEY }}
#          owner: streamx-com
#          repositories: homebrew-tap,homebrew-preview-tap

      - name: Release with JReleaser
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
#          JRELEASER_HOMEBREW_GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          JRELEASER_HOMEBREW_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN_VALKOVICH_DS_TEST }}
        run: |
          ls -la artifacts/
          chmod +x artifacts/streamx-*
          
          # Pre-create platform ZIPs manually
          VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)
          for PLATFORM in linux-x86_64 linux-aarch64 macos-aarch64 macos-x86_64; do
            mkdir -p staging/$PLATFORM/bin
            cp artifacts/streamx-$PLATFORM staging/$PLATFORM/bin/streamx
            cp LICENSE staging/$PLATFORM/
            cd staging
            zip -r ../artifacts/streamx-${VERSION}-${PLATFORM}.zip $PLATFORM/
            cd ..
          done
          
          ./mvnw jreleaser:full-release \
            -Djreleaser.config.file=${{ steps.release-type.outputs.jreleaser_config }} \
            -Djreleaser.strict=true

      - name: Upload JReleaser output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jreleaser-output
          path: |
            target/jreleaser/trace.log
            target/jreleaser/output.properties

      # Homebrew doesn't support multiple versions of the same formula.
      # Because of this, we create a separate formula for each version.
      - name: Create versioned Homebrew formula
        env:
          HOMEBREW_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN_VALKOVICH_DS_TEST }}
          BREW_TAP: ${{ steps.release-type.outputs.brew_tap }}
        run: |
          git clone https://x-access-token:${HOMEBREW_GITHUB_TOKEN}@github.com/valkovich-ds/${BREW_TAP}.git
          cd ${BREW_TAP}/Formula
          
          VERSION=$(cd ../../ && ./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)
          FILENAME="streamx@${VERSION}.rb"
          
          if [ -f "$FILENAME" ]; then
            echo "Versioned formula already exists, skipping."
            exit 0
          fi
          
          # Copy the freshly-pushed unversioned formula
          cp streamx.rb "$FILENAME"
          
          CLASS_SUFFIX=$(echo "$VERSION" | sed 's/[^a-zA-Z0-9]//g')
          sed -i "s/class Streamx/class StreamxAT${CLASS_SUFFIX}/" "$FILENAME"
          
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add "$FILENAME"
          git commit -m "Add versioned formula for ${VERSION}"
          git push

  brew-install-test:
    needs: release
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: linux-amd64
          - os: ubuntu-24.04-arm
            name: linux-arm64
          - os: macos-26
            name: macos-arm64
          - os: macos-26-intel
            name: macos-amd64
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}-brew-install-test
    steps:
      - name: Determine tap
        id: tap
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *-rc.* ]]; then
            echo "slug=valkovich-ds/preview-tap" >> $GITHUB_OUTPUT
          else
            echo "slug=valkovich-ds/tap" >> $GITHUB_OUTPUT
          fi

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Install latest streamx via Homebrew
        run: |
          brew install ${{ steps.tap.outputs.slug }}/streamx
          streamx --help
          streamx --version | grep -q "${{ github.ref_name }}" || { echo "Version mismatch: expected ${{ github.ref_name }}"; streamx --version; exit 1; }
          brew uninstall streamx

      - name: Install versioned streamx via Homebrew
        run: |
          brew install ${{ steps.tap.outputs.slug }}/streamx@${{ github.ref_name }}
          streamx --help
          streamx --version | grep -q "${{ github.ref_name }}" || { echo "Version mismatch: expected ${{ github.ref_name }}"; streamx --version; exit 1; }