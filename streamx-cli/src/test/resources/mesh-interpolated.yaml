descriptors:
  relay:
    type: "processing"
    containers:
      service:
        incoming:
          events: {}
        outgoing:
          relayed-events: {}

  web-server-sink:
    type: "edge"
    containers:
      sink:
        image: "${config.image.interpolated}"
        incoming:
          resources: {}
        servicePorts:
          - "8087:8080"

sources:
  cli:
    outgoing:
      - ref: "${config.source.interpolated:inbox.pages}"
        produces:
          - "com.streamx.blueprints.page.published.v1"
          - "com.streamx.blueprints.page.unpublished.v1"

ingestion:
  rest-ingestion:
    containers:
      proxy:
        environment:
          QUARKUS_HTTP_AUTH_PERMISSION_BEARER_POLICY: permit

processing:
  pages-relay:
    descriptor: relay
    containers:
      service:
        incoming:
          events:
            ref: inbox.pages
        outgoing:
          relayed-events:
            ref: outbox.pages

edge:
  web-server-sink:
    descriptor: web-server-sink
    containers:
      sink:
        incoming:
          resources:
            ref: outbox.pages
