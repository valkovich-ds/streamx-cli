project:
  name: streamx-cli
  description: StreamX CLI
  versionPattern: SEMVER
  snapshot:
    pattern: .*-SNAPSHOT
    label: early-access
    fullChangelog: true
  links:
    homepage: https://github.com/streamx-com/streamx-cli
  authors:
    - streamx
  inceptionYear: '2026'

platform:
  replacements:
    osx-x86_64: macos-x86_64
    osx-aarch_64: macos-aarch64

release:
  github:
    overwrite: true
    changelog:
      formatted: ALWAYS
      format: '- {{commitShortHash}} {{commitTitle}}'

assemble:
  archive:
    streamx-cli:
      active: ALWAYS
      formats:
        - ZIP
        - TAR_GZ
      fileSets:
        - input: artifacts
          includes:
            - 'streamx-*'
          output: bin
      artifacts:
        - path: artifacts/streamx-linux-x86_64
          platform: linux-x86_64
          extraProperties:
            graalVMNativeImage: true
        #        - path: artifacts/streamx-linux-aarch64
        #          platform: linux-aarch_64
        #          extraProperties:
        #            graalVMNativeImage: true
        - path: artifacts/streamx-macos-aarch64
          platform: osx-aarch_64
          extraProperties:
            graalVMNativeImage: true

distributions:
  streamx-cli:
    type: NATIVE_IMAGE
    executable:
      name: streamx
    artifacts:
      - path: artifacts/streamx-linux-x86_64
        platform: linux-x86_64
      #      - path: artifacts/streamx-linux-aarch64
      #        platform: linux-aarch_64
      - path: artifacts/streamx-macos-aarch64
        platform: osx-aarch_64

packagers:
  brew:
    active: ALWAYS
    repository:
      owner: valkovich-ds
      name: homebrew-tap
      tagName: '{{projectName}}-{{tagName}}'
    formulaName: streamx
    multiPlatform: true